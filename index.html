<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tanki Profile</title>
    <link rel="stylesheet" href="/styles.css?v=4" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="gate" id="gate">
        <div class="gateCard" role="button" tabindex="0" aria-label="Нажмите чтобы продолжить">
          <div class="gateLogo"></div>
          <div class="gateTitle">Tanki Online</div>
          <div class="gateHint">Нажмите чтобы продолжить</div>
        </div>
      </div>
      <header class="topbar">
        <div class="brand">
          <div class="brandMark"></div>
          <div>
            <div class="brandTitle">Tanki Online</div>
            <div class="brandSub">Профиль</div>
          </div>
        </div>
        <div class="topbarRight">
          <div class="music">
            <button id="musicToggle" class="musicBtn" type="button" aria-label="Музыка">
              Музыка: Вкл
            </button>
            <input id="musicVolume" class="musicVol" type="range" min="0" max="100" value="40" />
          </div>
          <div class="pills">
            <div class="pill" id="pillCrystals">0</div>
            <div class="pill" id="pillContainers">0</div>
          </div>
        </div>
      </header>

      <nav class="tabs" id="tabs">
        <button class="tab isActive" data-tab="profile">Профиль</button>
        <button class="tab" data-tab="garage">Гараж</button>
        <button class="tab" data-tab="containers">Контейнеры</button>
        <button class="tab" data-tab="shop">Магазин</button>
      </nav>

      <main class="content">
        <section class="panel" id="panelNotice" style="display: none">
          <div class="panelTitle">Ошибка</div>
          <div class="panelBody" id="notice"></div>
        </section>

        <div class="modal" id="containerModal" style="display: none" aria-hidden="true">
          <div class="modalBackdrop" id="containerModalBackdrop"></div>
          <div class="modalCard" role="dialog" aria-modal="true" aria-label="Открытие контейнера">
            <div class="modalTop">
              <div class="modalTitle">Открытие контейнера</div>
              <button class="modalClose" id="containerModalClose" type="button" aria-label="Закрыть">✕</button>
            </div>
            <div class="modalBody">
              <div class="containerReveal">
                <div class="containerRevealStack">
                  <img id="containerModalImg" class="containerModalImg" alt="container" />
                  <img id="containerDropImg" class="containerDropImg" alt="drop" />
                </div>
              </div>
              <div class="hint" id="containerModalText"></div>
            </div>
          </div>
        </div>

        <section class="panel" id="panelProfile">
          <div class="panelTitle">Профиль</div>
          <div class="panelBody">
            <div class="profileHeader">
              <img id="rankImg" class="rankImg imgBlend" alt="rank" />
              <div class="profileHeaderRight">
                <div class="statLabel">Звание</div>
                <div class="big" id="rankName">—</div>
                <div class="muted">Танк</div>
                <img id="tankImg" class="tankImg tankImgBelow imgBlend" alt="tank" />
              </div>
            </div>
            <div class="grid2">
              <div class="stat">
                <div class="statLabel">Опыт</div>
                <div class="statValue" id="expValue">—</div>
              </div>
              <div class="stat">
                <div class="statLabel">Бои</div>
                <div class="statValue" id="battlesValue">—</div>
              </div>
              <div class="stat">
                <div class="statLabel">Победы / Поражения</div>
                <div class="statValue" id="wlValue">—</div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel" id="panelGarage">
          <div class="panelTitle">Гараж</div>
          <div class="panelBody">
            <div class="garageCard">
              <div class="garageTank">
                <img id="garageTankImg" class="garageTankImg imgBlend" alt="tank" />
              </div>
              <div class="grid2">
                <div>
                  <div class="fieldLabel">Пушка</div>
                  <select id="weaponSelect" class="select"></select>
                </div>
                <div>
                  <div class="fieldLabel">Корпус</div>
                  <select id="hullSelect" class="select"></select>
                </div>
              </div>
            </div>
            <button id="saveTankBtn" class="btnPrimary">Сохранить танк</button>
            <div class="hint" id="garageHint"></div>
          </div>
        </section>

        <section class="panel" id="panelContainers">
          <div class="panelTitle">Контейнеры</div>
          <div class="panelBody">
            <div class="containerHero">
              <img id="containerImg" class="containerImg" alt="container" />
            </div>
            <div class="row">
              <button id="openContainerBtn" class="btnPrimary">Открыть контейнер</button>
              <button id="refreshBtn" class="btnGhost">Обновить</button>
            </div>
            <div class="hint" id="containerResult"></div>
            <div class="small">
              Шансы: Рельса 2%, Шафт 2%, Гром 5%, Титан 2%, Кристаллы 89%
            </div>
          </div>
        </section>

        <section class="panel" id="panelShop">
          <div class="panelTitle">Магазин</div>
          <div class="panelBody">
            <div class="segmented" id="shopCategory">
              <button class="segBtn isActive" data-cat="weapon">Пушки</button>
              <button class="segBtn" data-cat="hull">Корпуса</button>
            </div>
            <div id="shopList" class="list"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js?v=5"></script>
  </body>
</html>
